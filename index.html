<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅遊分帳 — Travel Expense Splitter</title>
  <meta name="description" content="記錄每筆旅遊花費、自動計算分帳、支援多國貨幣的旅伴費用分攤工具">
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="%236366F1"><path d="M350-80v-40l80-60v-220L80-280v-60l350-220v-220q0-25 17.5-42.5T490-840q25 0 42.5 17.5T550-780v220l350 220v60L550-400v220l80 60v40l-140-40-140 40Z"/></svg>'>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="app">

    <!-- ═══════════ Welcome / Login Screen ═══════════ -->
    <div id="welcome-screen" class="welcome-screen">
      <div class="welcome-card">
        <div class="welcome-icon"><span class="material-symbols-outlined">flight</span></div>
        <h1>旅遊分帳</h1>
        <p>記錄每筆花費、自動計算誰該付多少<br>支援多國貨幣，輕鬆解決旅伴帳務</p>
        <div id="setup-hint" style="display:none;">
          <strong><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">warning</span> API 憑證未設定</strong><br>
          請開啟 <code>app.js</code>，填入 <code>CLIENT_ID</code> 與 <code>SPREADSHEET_ID</code>。
        </div>
        <button id="welcome-login-btn" class="btn btn-primary btn-lg btn-block" style="display:none;">
          <span class="material-symbols-outlined">login</span>
          連結 Google 帳號
        </button>
      </div>
    </div>

    <!-- ═══════════ Trip Selection Screen ═══════════ -->
    <div id="trip-screen" class="screen" style="display:none;">
      <div class="trip-screen-header">
        <h1>我的旅行</h1>
        <button id="logout-btn-trips" class="btn-icon" title="登出">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
      <div id="trip-list" class="trip-list">
        <div class="loading-state"><div class="spinner"></div><br>載入中...</div>
      </div>
      <button id="new-trip-btn" class="fab fab-trip" title="新增旅行">
        <span class="material-symbols-outlined">add</span>
      </button>
    </div>

    <!-- ═══════════ Main App ═══════════ -->
    <div id="main-app" class="screen" style="display:none;">

      <!-- App Header -->
      <header class="app-header">
        <button id="back-to-trips" class="btn-icon" title="返回旅行列表">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="header-trip-info">
          <h2 id="current-trip-name">—</h2>
          <span id="current-trip-currency" class="trip-currency-badge">TWD</span>
        </div>
        <button id="trip-settings-btn" class="btn-icon" title="旅行設定">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </header>

      <!-- Tab Content -->
      <div class="tab-content">

        <!-- ─── Overview Tab ─── -->
        <div id="tab-overview" class="tab-pane active">
          <div class="overview-hero">
            <div class="hero-label">總花費</div>
            <div class="hero-amount" id="total-spent">$0</div>
            <div class="hero-sub" id="expense-count">0 筆費用 · 0 位成員</div>
          </div>
          <div class="section-title">成員餘額</div>
          <div id="member-balances" class="member-balances"></div>
          <div class="section-title">類別分析</div>
          <div class="chart-card">
            <canvas id="categoryChart"></canvas>
          </div>
          <div id="category-legend" class="category-legend"></div>
        </div>

        <!-- ─── Expenses Tab ─── -->
        <div id="tab-expenses" class="tab-pane" style="display:none;">
          <div id="expense-list" class="expense-list">
            <div class="loading-state">載入費用中...</div>
          </div>
        </div>

        <!-- ─── Settlement Tab ─── -->
        <div id="tab-settlement" class="tab-pane" style="display:none;">
          <div class="settlement-header">
            <span class="material-symbols-outlined">balance</span>
            <h3>最佳還款方案</h3>
            <p>以最少筆數完成所有結算</p>
          </div>
          <div id="settlement-list" class="settlement-list"></div>
        </div>

      </div>

      <!-- Bottom Tab Bar -->
      <nav class="tab-bar">
        <button class="tab-item active" data-tab="overview">
          <span class="material-symbols-outlined">dashboard</span>
          <span>總覽</span>
        </button>
        <button class="tab-item" data-tab="expenses">
          <span class="material-symbols-outlined">receipt_long</span>
          <span>費用</span>
        </button>
        <button class="tab-item" data-tab="settlement">
          <span class="material-symbols-outlined">handshake</span>
          <span>結算</span>
        </button>
      </nav>

      <!-- FAB -->
      <button id="add-expense-fab" class="fab" title="新增費用">
        <span class="material-symbols-outlined">add</span>
      </button>
    </div>

    <!-- ═══════════ Modals ═══════════ -->

    <!-- New Trip Modal -->
    <div id="modal-new-trip" class="modal-overlay" style="display:none;">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <h2>新增旅行</h2>
        <form id="trip-form">
          <div class="form-group">
            <label for="trip-name">旅行名稱</label>
            <input type="text" id="trip-name" placeholder="例：東京五日遊" required>
          </div>
          <div class="form-group">
            <label for="trip-currency">基準貨幣</label>
            <select id="trip-currency" required></select>
          </div>
          <div class="form-group">
            <label for="trip-members">成員（用逗號分隔）</label>
            <input type="text" id="trip-members" placeholder="例：小明, 小華, 小美" required>
          </div>
          <div id="trip-form-msg" class="form-msg"></div>
          <button type="submit" class="btn btn-primary btn-block" id="trip-submit-btn">建立旅行</button>
          <button type="button" class="btn btn-ghost btn-block" onclick="closeModal('modal-new-trip')">取消</button>
        </form>
      </div>
    </div>

    <!-- New Expense Modal -->
    <div id="modal-new-expense" class="modal-overlay" style="display:none;">
      <div class="modal-sheet modal-sheet-lg">
        <div class="modal-handle"></div>
        <h2>新增費用</h2>
        <form id="expense-form">
          <div class="form-group">
            <label for="exp-amount">金額</label>
            <div class="amount-row">
              <input type="number" id="exp-amount" placeholder="0" min="0" step="any" required>
              <select id="exp-currency"></select>
            </div>
          </div>
          <div class="form-group">
            <label for="exp-description">說明</label>
            <input type="text" id="exp-description" placeholder="例：晚餐燒肉" required>
          </div>
          <div class="form-group">
            <label for="exp-date">日期</label>
            <input type="date" id="exp-date" required>
          </div>
          <div class="form-group">
            <label for="exp-category">類別</label>
            <select id="exp-category" required>
              <option value="" disabled selected>選擇類別</option>
            </select>
          </div>
          <div class="form-group">
            <label for="exp-paid-by">誰付的？</label>
            <select id="exp-paid-by" required>
              <option value="" disabled selected>選擇付款人</option>
            </select>
          </div>
          <div class="form-group">
            <label>分攤成員</label>
            <div class="split-controls">
              <button type="button" id="select-all-members" class="btn btn-ghost btn-sm">全選</button>
            </div>
            <div id="split-members" class="split-members"></div>
          </div>
          <div id="exp-msg" class="form-msg"></div>
          <button type="submit" class="btn btn-primary btn-block" id="exp-submit-btn">新增費用</button>
          <button type="button" class="btn btn-ghost btn-block" onclick="closeModal('modal-new-expense')">取消</button>
        </form>
      </div>
    </div>

    <!-- Trip Settings Modal -->
    <div id="modal-trip-settings" class="modal-overlay" style="display:none;">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <h2>旅行設定</h2>
        <div class="form-group">
          <label>旅行名稱</label>
          <div class="add-member-row">
            <input type="text" id="edit-trip-name" placeholder="修改旅行名稱">
            <button type="button" id="edit-trip-btn" class="btn btn-primary btn-sm">儲存</button>
          </div>
        </div>
        <div class="form-group">
          <label>新增成員</label>
          <div class="add-member-row">
            <input type="text" id="new-member-name" placeholder="成員名稱">
            <button type="button" id="add-member-btn" class="btn btn-primary btn-sm">新增</button>
          </div>
        </div>
        <div class="form-group">
          <label>目前成員</label>
          <div id="settings-member-list" class="settings-member-list"></div>
        </div>
        <hr>
        <button type="button" id="delete-trip-btn" class="btn btn-danger btn-block">刪除此旅行</button>
        <button type="button" class="btn btn-ghost btn-block" onclick="closeModal('modal-trip-settings')">關閉</button>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div id="modal-confirm" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <div class="modal-icon-wrapper warning">
          <span class="material-symbols-outlined">warning</span>
        </div>
        <h3 id="confirm-title">確認刪除？</h3>
        <p id="confirm-message">此操作無法復原</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="confirm-cancel">取消</button>
          <button class="btn btn-danger" id="confirm-ok">確認</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
